<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <style>
      .completed {
        text-decoration: line-through;
      }
    </style>
  </head>

  <body>
    <h1>Todo App</h1>

    <input id="todo-input" />
    <button id="add-button">Add</button>
    <button id="archive-button">Archive completed</button>

    <ul id="todo-list"></ul>

    <script>
      const input = document.getElementById('todo-input');
      const button = document.getElementById('add-button');
      const archiveButton = document.getElementById('archive-button');
      const list = document.getElementById('todo-list');

      async function loadTodos() {
        const response = await fetch('http://localhost:8081/api/todos');
        return await response.json();
      }

      async function renderTodos() {
        list.innerHTML = '';

        const todos = await loadTodos();

        for (const todo of todos) {
          const li = document.createElement('li');

          if (todo.completed) {
            li.classList.add('completed');
          }

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = todo.completed;

          checkbox.addEventListener('change', async () => {
            await fetch(`http://localhost:8081/api/todos/${todo.id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                completed: checkbox.checked,
              }),
            });

            await renderTodos();
          });

          const text = document.createElement('span');
          text.textContent = todo.text;

          text.addEventListener('dblclick', () => {
            const editInput = document.createElement('input');
            editInput.id = 'edit-input';
            editInput.value = todo.text;

            li.replaceChild(editInput, text);
            editInput.focus();

            editInput.addEventListener('keydown', async (event) => {
              if (event.key === 'Enter') {
                await fetch(`http://localhost:8081/api/todos/${todo.id}/text`, {
                  method: 'PUT',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    text: editInput.value,
                  }),
                });

                await renderTodos();
              }
            });
          });

          li.appendChild(checkbox);
          li.appendChild(text);
          list.appendChild(li);
        }
      }

      button.addEventListener('click', async () => {
        await fetch('http://localhost:8081/api/todos', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            text: input.value,
          }),
        });

        input.value = '';

        await renderTodos();
      });

      archiveButton.addEventListener('click', async () => {
        await fetch('http://localhost:8081/api/todos/completed', {
          method: 'DELETE',
        });

        await renderTodos();
      });

      renderTodos();
    </script>
  </body>
</html>
